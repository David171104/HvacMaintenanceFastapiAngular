<div class="page-wrapper">
  <div class="form-container">
    <h2>Iniciar Sesión</h2>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" name="email" [(ngModel)]="loginData.email" required />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" required />
      </div>

      <div class="form-group">
        <button type="submit">Ingresar</button>
      </div>
      
    </form>
    <button type="submit" class="btn-microsoft" (click)="loginMicrosoft($event)">
      <i class="fab fa-microsoft"></i>
      Ingresar con Microsoft 365
    </button>

    <div style="margin-top: 20px;">
      <button type="button"  (click)="logoutMicrosoft()">Crear cuenta</button>
    </div>

  </div>
</div>
