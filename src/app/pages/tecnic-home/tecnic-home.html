<div class="home-layout">
  <app-sidebar></app-sidebar>

  <main class="home-content">

    <div class="technic-container">

      <div class="technic-header">
        <h1 class="technic-title">
          Bienvenido
          <span class="technic-gradient">
            {{ userName }} {{ userLastName }}
          </span>
        </h1>

        <p class="technic-subtitle">
          Panel de {{ userRole | titlecase }}
        </p>
        <p class="technic-subtitle">
          Administra los servicios asignados y actualiza su estado.
        </p>
      </div>

      <div class="technic-cards">

        <div class="technic-card">
          <h3>Servicios asignados</h3>
          <p>Consulta los servicios que te han sido asignados.</p>
          <button class="technic-btn" routerLink="/assigned-services">
            Ver servicios
          </button>
        </div>

        <div class="technic-card">
          <h3>Actualizar estado</h3>
          <p>Marca servicios como en proceso o completados.</p>
          <button class="technic-btn" routerLink="/update-services">
            Actualizar
          </button>
        </div>

      </div>

    </div>

  </main>
</div>
